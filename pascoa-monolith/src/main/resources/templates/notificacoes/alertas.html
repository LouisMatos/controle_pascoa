<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Alertas — Sistema Páscoa</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0">
            <i class="bi bi-bell me-2 text-warning"></i>Central de Alertas
            <span th:if="${naoLidos > 0}" class="badge bg-danger ms-2"
                  th:text="${naoLidos}"></span>
        </h4>
        <div class="d-flex gap-2">
            <form th:if="${naoLidos > 0}" th:action="@{/alertas/marcar-todos-lidos}" method="post">
                <button type="submit" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-check2-all me-1"></i>Marcar todos lidos
                </button>
            </form>
            <form th:action="@{/alertas/excluir-lidos}" method="post"
                  onsubmit="return confirm('Excluir todos os alertas lidos?')">
                <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash me-1"></i>Limpar lidos
                </button>
            </form>
        </div>
    </div>

    <!-- Flash -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show py-2 small" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Abas de filtro -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a th:href="@{/alertas(filtro='todos')}"
               th:classappend="${filtro == 'todos'} ? 'active'"
               class="nav-link">
                <i class="bi bi-list-ul me-1"></i>Todos
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/alertas(filtro='naoLidos')}"
               th:classappend="${filtro == 'naoLidos'} ? 'active'"
               class="nav-link">
                <i class="bi bi-circle-fill me-1 text-danger" style="font-size:.5rem; vertical-align:middle;"></i>
                Não lidos
                <span th:if="${naoLidos > 0}" class="badge bg-danger ms-1 rounded-pill"
                      th:text="${naoLidos}"></span>
            </a>
        </li>
    </ul>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(alertas)}" class="text-center text-muted py-5">
                <i class="bi bi-bell-slash fs-2 d-block mb-2 opacity-40"></i>
                Nenhum alerta encontrado.
            </div>

            <div th:each="a : ${alertas}"
                 th:classappend="${!a.lido} ? 'bg-light fw-semibold'"
                 class="d-flex align-items-start gap-3 px-4 py-3 border-bottom">

                <!-- Ícone colorido -->
                <div th:class="'text-' + ${a.cor} + ' fs-4 pt-1 flex-shrink-0'">
                    <i th:class="'bi ' + ${a.icone}"></i>
                </div>

                <!-- Mensagem + hora -->
                <div class="flex-grow-1 min-width-0">
                    <div class="text-break" th:text="${a.mensagem}"></div>
                    <div class="text-muted small"
                         th:text="${#temporals.format(a.criadoEm, 'dd/MM/yyyy HH:mm')}"></div>
                </div>

                <!-- Badge não-lido -->
                <span th:unless="${a.lido}" class="badge bg-danger align-self-center flex-shrink-0">Novo</span>

                <!-- Ações -->
                <div class="d-flex gap-1 align-self-center flex-shrink-0">
                    <!-- Ir para o link -->
                    <form th:if="${a.link != null}"
                          th:action="@{/alertas/{id}/lido(id=${a.id})}" method="post">
                        <input type="hidden" name="redirect" th:value="${a.link}">
                        <input type="hidden" name="filtro"   th:value="${filtro}">
                        <button type="submit" class="btn btn-sm btn-outline-primary"
                                title="Ir para o detalhe">
                            <i class="bi bi-arrow-right-circle"></i>
                        </button>
                    </form>
                    <!-- Marcar como lido -->
                    <form th:unless="${a.lido}"
                          th:action="@{/alertas/{id}/lido(id=${a.id})}" method="post">
                        <input type="hidden" name="filtro" th:value="${filtro}">
                        <button type="submit" class="btn btn-sm btn-outline-secondary"
                                title="Marcar como lido">
                            <i class="bi bi-check2"></i>
                        </button>
                    </form>
                    <!-- Excluir -->
                    <form th:action="@{/alertas/{id}/excluir(id=${a.id})}" method="post"
                          onsubmit="return confirm('Excluir este alerta?')">
                        <input type="hidden" name="filtro" th:value="${filtro}">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                title="Excluir alerta">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
