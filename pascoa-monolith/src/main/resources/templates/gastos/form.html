<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${gastoId != null ? 'Editar Gasto' : 'Novo Gasto'} + ' — Sistema Páscoa'">Gasto — Sistema Páscoa</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/gastos}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0">
            <i class="bi bi-receipt me-2 text-danger"></i>
            <span th:text="${gastoId != null ? 'Editar Gasto' : 'Novo Gasto'}"></span>
        </h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body p-4">
                    <form th:action="${gastoId != null ? '/gastos/' + gastoId + '/editar' : '/gastos/novo'}"
                          th:object="${form}" method="post" novalidate>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descrição <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{descricao}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('descricao')} ? 'is-invalid'"
                                   placeholder="Ex: Sacolas para embalagem">
                            <div class="invalid-feedback" th:errors="*{descricao}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold">Valor (R$) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" min="0.01"
                                       th:field="*{valor}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid'"
                                       placeholder="0,00">
                                <div class="invalid-feedback" th:errors="*{valor}"></div>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold">Data do Lançamento <span class="text-danger">*</span></label>
                                <input type="date" th:field="*{dataLancamento}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('dataLancamento')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{dataLancamento}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Categoria <span class="text-danger">*</span></label>
                            <select th:field="*{categoria}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">
                                <option value="">Selecione...</option>
                                <option th:each="c : ${categorias}"
                                        th:value="${c.name()}"
                                        th:text="${c.descricao}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{categoria}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Observações</label>
                            <textarea th:field="*{observacoes}"
                                      class="form-control" rows="2"
                                      placeholder="Detalhes adicionais..."></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/gastos}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i>Salvar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
