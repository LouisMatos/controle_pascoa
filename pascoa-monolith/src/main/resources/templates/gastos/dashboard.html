<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Gastos — Sistema Páscoa</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="bi bi-bar-chart me-2 text-danger"></i>Dashboard de Gastos
        </h2>
        <a th:href="@{/gastos}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-list-ul me-1"></i>Ver Lançamentos
        </a>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtro de período -->
    <div class="card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/gastos/dashboard}" method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label small fw-semibold mb-1">Mês</label>
                    <select name="mes" class="form-select form-select-sm">
                        <option th:each="m : ${#numbers.sequence(1,12)}"
                                th:value="${m}"
                                th:text="${{'Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'}[m-1]}"
                                th:selected="${m == mesAtual}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="form-label small fw-semibold mb-1">Ano</label>
                    <input type="number" name="ano" class="form-control form-control-sm"
                           th:value="${anoAtual}" min="2020" max="2100" style="width:90px">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>Filtrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- KPIs -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
            <div class="card border-danger">
                <div class="card-body">
                    <div class="text-muted small fw-semibold text-uppercase">Total Realizado</div>
                    <div class="fs-4 fw-bold text-danger mt-1">
                        R$ <span th:text="${#numbers.formatDecimal(dashboard.totalRealizado(), 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-primary">
                <div class="card-body">
                    <div class="text-muted small fw-semibold text-uppercase">Total Orçado</div>
                    <div class="fs-4 fw-bold text-primary mt-1">
                        R$ <span th:text="${#numbers.formatDecimal(dashboard.totalOrcado(), 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3"
             th:classappend="${saldoTotal >= 0} ? 'card border-success' : 'card border-danger'">
            <div class="card"
                 th:classappend="${saldoTotal.compareTo(T(java.math.BigDecimal).ZERO) >= 0} ? 'border-success' : 'border-danger'">
                <div class="card-body">
                    <div class="text-muted small fw-semibold text-uppercase">Saldo</div>
                    <div class="fs-4 fw-bold mt-1"
                         th:classappend="${saldoTotal.compareTo(T(java.math.BigDecimal).ZERO) >= 0} ? 'text-success' : 'text-danger'">
                        R$ <span th:text="${#numbers.formatDecimal(saldoTotal, 1, 'POINT', 2, 'COMMA')}"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-3">
            <div class="card border-warning">
                <div class="card-body">
                    <div class="text-muted small fw-semibold text-uppercase">Categorias Estouradas</div>
                    <div class="fs-4 fw-bold text-warning mt-1" th:text="${estouradosCount}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <!-- Gráfico Chart.js -->
        <div class="col-lg-7">
            <div class="card h-100">
                <div class="card-header fw-semibold">
                    <i class="bi bi-bar-chart me-2"></i>Orçado × Realizado por Categoria
                </div>
                <div class="card-body">
                    <canvas id="gastosChart" height="280"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabela por categoria -->
        <div class="col-lg-5">
            <div class="card h-100">
                <div class="card-header fw-semibold">
                    <i class="bi bi-table me-2"></i>Detalhamento
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(dashboard.porCategoria())}"
                         class="text-center text-muted py-4">
                        Nenhum dado para o período.
                    </div>
                    <table th:unless="${#lists.isEmpty(dashboard.porCategoria())}"
                           class="table table-hover align-middle mb-0 small">
                        <thead>
                            <tr>
                                <th class="ps-3">Categoria</th>
                                <th class="text-end">Realizado</th>
                                <th class="text-end">Orçado</th>
                                <th class="text-end pe-3">%</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${dashboard.porCategoria()}"
                                th:classappend="${r.estourado()} ? 'table-danger'">
                                <td class="ps-3 fw-semibold" th:text="${r.categoria().descricao}"></td>
                                <td class="text-end text-danger">
                                    R$ <span th:text="${#numbers.formatDecimal(r.realizado(), 1, 'POINT', 2, 'COMMA')}"></span>
                                </td>
                                <td class="text-end text-primary">
                                    <span th:if="${r.orcado().compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                                        R$ <span th:text="${#numbers.formatDecimal(r.orcado(), 1, 'POINT', 2, 'COMMA')}"></span>
                                    </span>
                                    <span th:unless="${r.orcado().compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                          class="text-muted">—</span>
                                </td>
                                <td class="text-end pe-3 fw-bold">
                                    <span th:if="${r.orcado().compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                          th:classappend="${r.estourado()} ? 'text-danger' : 'text-success'"
                                          th:text="${r.percentualUtilizado()} + '%'"></span>
                                    <span th:unless="${r.orcado().compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                                          class="text-muted">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Orçamento por categoria -->
    <div class="card mt-4">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-wallet2 me-2"></i>Definir Orçamento por Categoria</span>
            <span class="text-muted small fw-normal">
                Mês <span th:text="${mesAtual}"></span>/<span th:text="${anoAtual}"></span>
            </span>
        </div>
        <div class="card-body">
            <form th:action="@{/gastos/orcamento}" method="post" class="row g-2 align-items-end">
                <input type="hidden" name="referenciaMes" th:value="${mesAtual}">
                <input type="hidden" name="referenciaAno" th:value="${anoAtual}">
                <div class="col-sm-4">
                    <label class="form-label small fw-semibold mb-1">Categoria</label>
                    <select name="categoria" class="form-select form-select-sm" required>
                        <option value="">Selecione...</option>
                        <option th:each="c : ${categorias}"
                                th:value="${c.name()}"
                                th:text="${c.descricao}"></option>
                    </select>
                </div>
                <div class="col-sm-3">
                    <label class="form-label small fw-semibold mb-1">Valor Orçado (R$)</label>
                    <input type="number" step="0.01" min="0" name="valorOrcado"
                           class="form-control form-control-sm" placeholder="0,00" required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-save me-1"></i>Salvar Orçamento
                    </button>
                </div>
            </form>

            <div th:unless="${#lists.isEmpty(orcamentos)}" class="mt-3">
                <p class="text-muted small mb-2">Orçamentos definidos para o período:</p>
                <div class="d-flex flex-wrap gap-2">
                    <span th:each="o : ${orcamentos}"
                          class="badge bg-primary-subtle text-primary-emphasis border border-primary-subtle rounded-pill px-3 py-2">
                        <span th:text="${o.categoria.descricao}"></span>:
                        R$ <span th:text="${#numbers.formatDecimal(o.valorOrcado, 1, 'POINT', 2, 'COMMA')}"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const chartLabels    = /*[[${chartLabels}]]*/    [];
    const chartRealizado = /*[[${chartRealizado}]]*/ [];
    const chartOrcado    = /*[[${chartOrcado}]]*/    [];

    if (chartLabels.length > 0) {
        const ctx = document.getElementById('gastosChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: chartLabels,
                datasets: [
                    {
                        label: 'Realizado',
                        data: chartRealizado,
                        backgroundColor: 'rgba(220, 53, 69, 0.75)',
                        borderColor: 'rgba(220, 53, 69, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'Orçado',
                        data: chartOrcado,
                        backgroundColor: 'rgba(13, 110, 253, 0.35)',
                        borderColor: 'rgba(13, 110, 253, 0.8)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return ' R$ ' + ctx.parsed.y.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(v) { return 'R$ ' + v.toLocaleString('pt-BR'); }
                        }
                    }
                }
            }
        });
    }
    /*]]>*/
</script>
</body>
</html>
