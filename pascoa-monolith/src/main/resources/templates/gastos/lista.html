<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gastos Variáveis — Sistema Páscoa</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="bi bi-receipt me-2 text-danger"></i>Gastos Variáveis
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/gastos/importar}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-upload me-1"></i>Importar CSV
            </a>
            <a th:href="@{/gastos/dashboard}" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-bar-chart me-1"></i>Dashboard
            </a>
            <a th:href="@{/gastos/novo}" class="btn btn-success btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Novo Gasto
            </a>
        </div>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtros -->
    <div class="card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/gastos}" method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label small fw-semibold mb-1">Mês</label>
                    <select name="mes" class="form-select form-select-sm">
                        <th:block th:each="m : ${#numbers.sequence(1,12)}">
                            <option th:value="${m}"
                                    th:text="${#strings.listJoin(#lists.toList({'Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'})[m-1], '')}"
                                    th:selected="${m == mesAtual}"></option>
                        </th:block>
                    </select>
                </div>
                <div class="col-auto">
                    <label class="form-label small fw-semibold mb-1">Ano</label>
                    <input type="number" name="ano" class="form-control form-control-sm"
                           th:value="${anoAtual}" min="2020" max="2100" style="width:90px">
                </div>
                <div class="col-auto">
                    <label class="form-label small fw-semibold mb-1">Categoria</label>
                    <select name="categoria" class="form-select form-select-sm">
                        <option value="">Todas</option>
                        <option th:each="c : ${categorias}"
                                th:value="${c.name()}"
                                th:text="${c.descricao}"
                                th:selected="${c == categoriaAtual}"></option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>Filtrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- KPI total do mês -->
    <div class="row g-3 mb-4">
        <div class="col-sm-4">
            <div class="card border-danger">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-muted small fw-semibold text-uppercase">Total do Período</div>
                            <div class="fs-4 fw-bold text-danger mt-1">
                                R$ <span th:text="${#numbers.formatDecimal(totalMes, 1, 'POINT', 2, 'COMMA')}"></span>
                            </div>
                            <div class="text-muted small mt-1">
                                <span th:text="${#lists.size(gastos)}"></span> lançamento(s)
                            </div>
                        </div>
                        <i class="bi bi-cash-coin fs-1 text-danger opacity-25"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(gastos)}" class="text-center text-muted py-5">
                <i class="bi bi-receipt fs-2 d-block mb-2 opacity-40"></i>
                Nenhum gasto registrado para este período.
                <div class="mt-3">
                    <a th:href="@{/gastos/novo}" class="btn btn-sm btn-success">
                        <i class="bi bi-plus-lg me-1"></i>Registrar Gasto
                    </a>
                </div>
            </div>
            <table th:unless="${#lists.isEmpty(gastos)}"
                   class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-3">Data</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th class="text-end">Valor</th>
                        <th class="text-end pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="g : ${gastos}">
                        <td class="ps-3 text-muted small"
                            th:text="${#temporals.format(g.dataLancamento, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span class="fw-semibold" th:text="${g.descricao}"></span>
                            <div th:if="${g.observacoes}" class="text-muted small" th:text="${g.observacoes}"></div>
                        </td>
                        <td>
                            <span class="badge rounded-pill bg-secondary"
                                  th:text="${g.categoria.descricao}"></span>
                        </td>
                        <td class="text-end fw-semibold text-danger">
                            R$ <span th:text="${#numbers.formatDecimal(g.valor, 1, 'POINT', 2, 'COMMA')}"></span>
                        </td>
                        <td class="text-end pe-3">
                            <a th:href="@{/gastos/{id}/editar(id=${g.id})}"
                               class="btn btn-sm btn-outline-secondary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/gastos/{id}/excluir(id=${g.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Excluir este gasto?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-light fw-bold">
                        <td colspan="3" class="ps-3 text-end">Total</td>
                        <td class="text-end text-danger">
                            R$ <span th:text="${#numbers.formatDecimal(totalMes, 1, 'POINT', 2, 'COMMA')}"></span>
                        </td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

</div>
</body>
</html>
