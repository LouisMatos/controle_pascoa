<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sistema Páscoa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #d4edda 0%, #f8f9fa 100%); }
        .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div style="width: 380px;">
        <div class="text-center mb-4">
            <i class="bi bi-egg-fill text-success" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-2 mb-0">Páscoa Gestão</h3>
            <p class="text-muted small">Sistema de Gestão de Ovos Artesanais</p>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <div th:if="${param.erro}" class="alert alert-danger py-2 small mb-3">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    Usuário ou senha incorretos. Tente novamente.
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3">
                    <i class="bi bi-check-circle-fill me-1"></i>
                    Você saiu do sistema. Até logo!
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Login</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" name="username"
                                   class="form-control" autofocus autocomplete="username"
                                   placeholder="seu.login" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" name="password"
                                   class="form-control" autocomplete="current-password"
                                   placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                    <div class="text-center mt-3">
                        <a href="/auth/forgot-password" class="text-muted small">
                            <i class="bi bi-key me-1"></i>Esqueceu sua senha?
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <p class="text-center text-muted small mt-3">
            © 2025 — Confeitaria Artesanal
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
