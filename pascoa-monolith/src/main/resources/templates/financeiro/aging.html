<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Aging de Recebíveis</title></head>
<body>
<div id="pageContent">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="bi bi-clock-history me-2 text-info"></i>Aging de Recebíveis</h2>
    <span class="text-muted small">Contas a receber abertas por faixa de atraso</span>
  </div>

  <!-- Resumo por faixa -->
  <div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl">
      <div class="card border-success">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">Corrente</div>
          <div class="fs-5 fw-bold text-success mt-1">R$ <span th:text="${#numbers.formatDecimal(aging.totalCorrente,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small" th:text="${#lists.size(aging.corrente)} + ' conta(s)'"></div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl">
      <div class="card border-warning">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">1–30 dias</div>
          <div class="fs-5 fw-bold text-warning mt-1">R$ <span th:text="${#numbers.formatDecimal(aging.total1a30,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small" th:text="${#lists.size(aging.atraso1a30)} + ' conta(s)'"></div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl">
      <div class="card border-orange" style="border-color:#fd7e14!important">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">31–60 dias</div>
          <div class="fs-5 fw-bold mt-1" style="color:#fd7e14">R$ <span th:text="${#numbers.formatDecimal(aging.total31a60,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small" th:text="${#lists.size(aging.atraso31a60)} + ' conta(s)'"></div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl">
      <div class="card border-danger">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">61–90 dias</div>
          <div class="fs-5 fw-bold text-danger mt-1">R$ <span th:text="${#numbers.formatDecimal(aging.total61a90,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small" th:text="${#lists.size(aging.atraso61a90)} + ' conta(s)'"></div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl">
      <div class="card border-dark">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">&gt;90 dias</div>
          <div class="fs-5 fw-bold text-dark mt-1">R$ <span th:text="${#numbers.formatDecimal(aging.totalAcima90,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small" th:text="${#lists.size(aging.atrasoAcima90)} + ' conta(s)'"></div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl">
      <div class="card bg-light">
        <div class="card-body text-center">
          <div class="text-muted small fw-semibold text-uppercase">Total Geral</div>
          <div class="fs-5 fw-bold mt-1">R$ <span th:text="${#numbers.formatDecimal(aging.totalGeral,1,'POINT',2,'COMMA')}"></span></div>
          <div class="text-muted small">em aberto</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabela detalhada por faixa -->
  <div th:fragment="tabelaFaixa(lista, titulo, corBadge)" th:remove="tag">
    <div th:if="${!#lists.isEmpty(lista)}" class="card mb-3">
      <div class="card-header bg-light fw-semibold">
        <span th:class="'badge me-2 ' + ${corBadge}" th:text="${titulo}"></span>
        <span th:text="${#lists.size(lista)} + ' conta(s)'"></span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-light">
            <tr><th>#Conta</th><th>Cliente</th><th>Pedido</th><th>Vencimento</th><th class="text-center">Atraso</th><th class="text-end">Saldo</th></tr>
          </thead>
          <tbody>
            <tr th:each="l : ${lista}">
              <td th:text="${l.contaId}"></td>
              <td th:text="${l.clienteNome}"></td>
              <td><a th:href="@{/pedidos/{id}(id=${l.pedidoId})}" th:text="'#' + ${l.pedidoId}"></a></td>
              <td th:text="${#temporals.format(l.vencimento,'dd/MM/yyyy')}"></td>
              <td class="text-center">
                <span th:text="${l.diasAtraso == 0 ? 'corrente' : l.diasAtraso + ' dias'}"
                      th:class="${l.diasAtraso == 0} ? 'badge bg-success' : 'badge bg-danger'"></span>
              </td>
              <td class="text-end fw-semibold">R$ <span th:text="${#numbers.formatDecimal(l.saldo,1,'POINT',2,'COMMA')}"></span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div th:replace="~{::tabelaFaixa(${aging.corrente},    'Corrente',  'bg-success')}"></div>
  <div th:replace="~{::tabelaFaixa(${aging.atraso1a30},  '1–30 dias', 'bg-warning text-dark')}"></div>
  <div th:replace="~{::tabelaFaixa(${aging.atraso31a60}, '31–60 dias','bg-warning text-dark')}"></div>
  <div th:replace="~{::tabelaFaixa(${aging.atraso61a90}, '61–90 dias','bg-danger')}"></div>
  <div th:replace="~{::tabelaFaixa(${aging.atrasoAcima90},'>90 dias',  'bg-dark')}"></div>

  <div th:if="${aging.totalGeral.compareTo(T(java.math.BigDecimal).ZERO) == 0}" class="alert alert-success">
    <i class="bi bi-check-circle me-1"></i>Nenhuma conta em aberto.
  </div>

</div>
</body>
</html>
