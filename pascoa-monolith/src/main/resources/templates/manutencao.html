<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema em Manutenção</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .maintenance-card {
            max-width: 520px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        .maintenance-icon {
            font-size: 4rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: .5; }
        }
    </style>
</head>
<body>

<div class="container px-3">
    <div class="card maintenance-card mx-auto">
        <div class="card-body text-center p-5">

            <div class="text-warning maintenance-icon mb-3">
                <i class="bi bi-tools"></i>
            </div>

            <h2 class="fw-bold mb-2">Sistema em Manutenção</h2>

            <p class="text-muted mb-3"
               th:text="${mensagem} ?: 'O sistema está temporariamente indisponível para manutenção.'">
                O sistema está temporariamente indisponível para manutenção.
            </p>

            <div th:if="${previsaoRetorno != null and !#strings.isEmpty(previsaoRetorno)}"
                 class="alert alert-info d-inline-flex align-items-center gap-2 px-4 py-2 rounded-pill mb-3">
                <i class="bi bi-clock me-1"></i>
                <span>Previsão de retorno: <strong th:text="${previsaoRetorno}"></strong></span>
            </div>

            <hr class="my-4">

            <p class="small text-muted mb-3">
                Se você é administrador do sistema, faça login para continuar com acesso completo.
            </p>

            <a href="/login" class="btn btn-success">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar como Admin
            </a>
        </div>
        <div class="card-footer text-center text-muted small py-3 rounded-bottom" style="background:#f8f9fa;">
            <i class="bi bi-egg-fill me-1 text-success"></i>Sistema Controle Páscoa
        </div>
    </div>
</div>

</body>
</html>
