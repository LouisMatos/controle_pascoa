<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Sistema Páscoa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #d4edda 0%, #f8f9fa 100%); }
        .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div style="width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-egg-fill text-success" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-2 mb-0">Páscoa Gestão</h3>
            <p class="text-muted small">Recuperação de Senha</p>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <h5 class="fw-bold mb-1">
                    <i class="bi bi-key me-2 text-success"></i>Esqueceu sua senha?
                </h5>
                <p class="text-muted small mb-3">
                    Informe seu login ou e-mail cadastrado. Se encontrarmos sua conta,
                    enviaremos um link de redefinição válido por 30 minutos.
                </p>

                <!-- Alertas flash -->
                <div th:if="${sucesso}" class="alert alert-success py-2 small mb-3" role="alert">
                    <i class="bi bi-check-circle-fill me-1"></i>
                    <span th:text="${sucesso}"></span>
                </div>
                <div th:if="${erro}" class="alert alert-danger py-2 small mb-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    <span th:text="${erro}"></span>
                </div>

                <form th:action="@{/auth/forgot-password}" method="post">
                    <div class="mb-3">
                        <label for="loginOuEmail" class="form-label fw-semibold">Login ou E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text"
                                   id="loginOuEmail"
                                   name="loginOuEmail"
                                   class="form-control"
                                   placeholder="seu.login ou email@exemplo.com"
                                   autofocus
                                   required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                        <i class="bi bi-envelope me-2"></i>Enviar Link de Redefinição
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Voltar para o login
                    </a>
                </div>
            </div>
        </div>

        <p class="text-center text-muted small mt-3">
            © 2025 — Confeitaria Artesanal
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
