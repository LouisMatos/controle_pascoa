<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verificação em Duas Etapas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="width:100%;max-width:400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem;"></i>
                <h5 class="mt-2 fw-semibold">Verificação em Duas Etapas</h5>
                <p class="text-muted small">Digite o código de 6 dígitos do seu aplicativo autenticador.</p>
            </div>

            <div th:if="${erro}" class="alert alert-danger py-2 small" th:text="${erro}"></div>

            <form th:action="@{/2fa/verificar}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <input type="text" name="codigo" class="form-control form-control-lg text-center"
                           placeholder="000000" maxlength="6" inputmode="numeric"
                           autofocus autocomplete="one-time-code" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle me-1"></i> Verificar
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="/logout" class="text-muted small">Cancelar e voltar ao login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
