<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${fornecedor.id == null ? 'Novo Fornecedor' : 'Editar Fornecedor'} + ' — Sistema Páscoa'">Formulário</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            <i class="bi bi-truck me-2 text-dark"></i>
            <span th:text="${fornecedor.id == null ? 'Novo Fornecedor' : 'Editar Fornecedor'}"></span>
        </h2>
        <a th:href="@{/fornecedores}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/fornecedores/salvar}" th:object="${fornecedor}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nome *</label>
                        <input type="text" class="form-control"
                               th:field="*{nome}"
                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                               placeholder="Razão social ou nome fantasia">
                        <div class="invalid-feedback" th:errors="*{nome}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">CNPJ</label>
                        <input type="text" class="form-control"
                               th:field="*{cnpj}"
                               placeholder="00.000.000/0000-00"
                               maxlength="18">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Telefone</label>
                        <input type="text" class="form-control"
                               th:field="*{telefone}"
                               placeholder="(00) 00000-0000"
                               maxlength="20">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">E-mail</label>
                        <input type="email" class="form-control"
                               th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="contato@fornecedor.com">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Observações</label>
                        <textarea class="form-control" th:field="*{observacoes}"
                                  rows="2" placeholder="Condições de pagamento, prazo de entrega..."></textarea>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                    <a th:href="@{/fornecedores}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
