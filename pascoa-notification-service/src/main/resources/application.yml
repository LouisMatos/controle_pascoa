server:
  port: 8088

spring:
  application:
    name: pascoa-notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/pascoa_notifications
    username: postgres
    password: sua_senha
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: pascoa
    password: pascoa123
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

notification:
  email:
    from: ${MAIL_FROM:noreply@pascoa.com.br}
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    api-url: ${WHATSAPP_API_URL:}
  sms:
    enabled: ${SMS_ENABLED:false}

auth:
  jwt:
    secret: "ALTERE-ESTA-CHAVE-SECRETA-MINIMO-32-CARACTERES-PROD"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: ${EUREKA_ENABLED:false}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
