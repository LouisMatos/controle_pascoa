

# =============================================================================
# Infraestrutura base — Sistema Páscoa v5 (Strangler Fig)
# Serviços: PostgreSQL x9, RabbitMQ, Redis, Zipkin
# Serviços Spring Cloud (Eureka, Config) rodam via Maven fora do compose
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — uma instância, múltiplos bancos (init script)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sua_senha
      POSTGRES_DB: pascoa_monolith
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # RabbitMQ — mensageria assíncrona entre microsserviços
  # Management UI: http://localhost:15672  (guest/guest)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    platform: linux/arm64
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: pascoa
      RABBITMQ_DEFAULT_PASS: pascoa123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — cache + JWT blacklist + rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    command: redis-server --requirepass pascoa123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pascoa123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Zipkin — distributed tracing
  # UI: http://localhost:9411
  # ---------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3
    platform: linux/arm64
    restart: unless-stopped
    environment:
      STORAGE_TYPE: mem
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Portas reservadas (serviços Spring Cloud — rodam via Maven/IntelliJ):
#   8761 — Eureka Server       (pascoa-eureka)
#   8888 — Config Server       (pascoa-config-server)
#   8080 — Monólito atual      (pascoa-monolith)
#   8090 — API Gateway         (pascoa-api-gateway)  — próxima etapa
# =============================================================================
