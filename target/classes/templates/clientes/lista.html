<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clientes — Sistema Páscoa</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0"><i class="bi bi-people me-2 text-primary"></i>Clientes</h2>
        <a th:href="@{/clientes/novo}" class="btn btn-success">
            <i class="bi bi-plus-lg me-1"></i>Novo Cliente
        </a>
    </div>

    <!-- Busca -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <form th:action="@{/clientes}" method="get" class="d-flex gap-2">
                <input type="text" name="busca" class="form-control" placeholder="Buscar por nome..."
                       th:value="${busca}">
                <button type="submit" class="btn btn-outline-secondary">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/clientes}" class="btn btn-outline-danger" th:if="${busca != null and !#strings.isEmpty(busca)}">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-3">Nome</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>CPF</th>
                        <th>Cadastro</th>
                        <th class="text-center pe-3">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${clientes}">
                        <td class="ps-3 fw-semibold" th:text="${c.nome}"></td>
                        <td th:text="${c.telefone}"></td>
                        <td th:text="${c.email}"></td>
                        <td th:text="${c.cpf}"></td>
                        <td th:text="${#temporals.format(c.criadoEm, 'dd/MM/yyyy')}"></td>
                        <td class="text-center pe-3">
                            <a th:href="@{/clientes/{id}/editar(id=${c.id})}"
                               class="btn btn-sm btn-outline-primary me-1" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/clientes/{id}/excluir(id=${c.id})}" method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Confirma a exclusão de ' + this.dataset.nome + '?')"
                                  th:data-nome="${c.nome}">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Excluir">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-people fs-3 d-block mb-2 opacity-50"></i>
                            Nenhum cliente encontrado.
                        </td>
                    </tr>
                </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer text-muted small" th:if="${!#lists.isEmpty(clientes)}">
            <span th:text="${#lists.size(clientes)}"></span> cliente(s) encontrado(s).
        </div>
    </div>

</div>
</body>
</html>
