# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/pascoa_db
spring.datasource.username=postgres
spring.datasource.password=sua_senha

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Aplicação
spring.application.name=pascoa
server.port=8080
# URL base para links gerados (ex.: PDF de pedido)
app.base-url=http://localhost:8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# Upload de imagens
app.upload.dir=${user.home}/pascoa-uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Notificações / Spring Mail ---
# Preencha com os dados do seu servidor SMTP para habilitar envio de e-mail real.
# Com testMode=true no canal EMAIL, o envio real nunca acontece (só log).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
spring.mail.password=sua-senha-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Evita erro de conexão SMTP no startup (testa conexão apenas ao enviar)
spring.mail.test-connection=false

# --- Notificações / WhatsApp (Evolution API) ---
# Configurado via tela de administração em /notificacoes/configuracao
# Estas propriedades são apenas referência — os valores ficam no banco (ConfiguracaoCanal)
notificacao.whatsapp.apiUrl=http://localhost:8080/evolution
notificacao.whatsapp.apiKey=sua-api-key
notificacao.whatsapp.instancia=pascoa
notificacao.whatsapp.testMode=true
