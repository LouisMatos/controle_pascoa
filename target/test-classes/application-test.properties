# ============================================================
# Configurações para testes de integração (perfil "test")
# Este arquivo fica em src/test/resources e tem prioridade
# sobre src/main/resources durante a execução de testes.
# ============================================================

# --- Banco H2 em memória ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate com H2 ---
# Sobrescreve AMBAS as chaves de dialeto definidas em application.properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Flyway desabilitado nos testes ---
# O Hibernate cria o schema via ddl-auto=create-drop a partir das entidades.
# As migrations usam sintaxe PostgreSQL (multi-coluna ALTER TABLE, índices parciais)
# incompatível com H2 — Flyway só deve rodar contra o banco de produção/homologação.
spring.flyway.enabled=false

# --- Bean overriding para substituição de LockProvider pelo no-op ---
spring.main.allow-bean-definition-overriding=true

# --- E-mail (stubs para evitar tentativa de conexão SMTP) ---
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.test-connection=false

# --- URL base (fallback padrão) ---
app.base-url=http://localhost:8080
