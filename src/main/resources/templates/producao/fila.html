<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fila de Produção — Sistema Páscoa</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            <i class="bi bi-gear me-2 text-primary"></i>Fila de Produção
        </h2>
    </div>

    <!-- Filtro de status -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/producao}" class="btn btn-sm"
                   th:classappend="${statusFiltro == null} ? 'btn-dark' : 'btn-outline-secondary'">
                    Todos
                </a>
                <a th:each="s : ${statusList}"
                   th:href="@{/producao(status=${s.name()})}"
                   class="btn btn-sm"
                   th:classappend="${statusFiltro == s ? s.badgeCss + ' text-white' : 'btn-outline-secondary'}"
                   th:text="${s.descricao}"></a>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" style="font-size:0.9rem">
                <thead>
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Produto</th>
                        <th class="text-center">Qtd</th>
                        <th class="text-center">Status</th>
                        <th>Pedido</th>
                        <th>Abertura</th>
                        <th>Conclusão</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${ordens}">
                        <td class="ps-3 text-muted small fw-semibold" th:text="${o.id}"></td>
                        <td class="fw-semibold" th:text="${o.produto.nome}"></td>
                        <td class="text-center fw-semibold" th:text="${o.quantidade}"></td>
                        <td class="text-center">
                            <span class="badge" th:classappend="${o.status.badgeCss}"
                                  th:text="${o.status.descricao}"></span>
                        </td>
                        <td>
                            <a th:if="${o.pedido != null}"
                               th:href="@{/pedidos/{id}(id=${o.pedido.id})}"
                               class="text-decoration-none small">
                                <i class="bi bi-cart3 me-1"></i>Pedido #<span th:text="${o.pedido.id}"></span>
                            </a>
                            <span th:if="${o.pedido == null}" class="text-muted small">—</span>
                        </td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(o.dataAbertura, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-muted small">
                            <span th:if="${o.dataConclusao != null}"
                                  th:text="${#temporals.format(o.dataConclusao, 'dd/MM/yyyy HH:mm')}"></span>
                            <span th:if="${o.dataConclusao == null}">—</span>
                        </td>
                        <td class="text-end pe-3">
                            <a th:href="@{/producao/{id}(id=${o.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ordens)}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-3 d-block mb-2 opacity-50"></i>
                            Nenhuma ordem de produção encontrada.
                        </td>
                    </tr>
                </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer text-muted small" th:if="${!#lists.isEmpty(ordens)}">
            <span th:text="${#lists.size(ordens)}"></span> ordem(ns).
        </div>
    </div>

</div>
</body>
</html>
