<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${cliente.id == null ? 'Novo Cliente' : 'Editar Cliente'} + ' — Sistema Páscoa'">Formulário</title>
</head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">
            <i class="bi bi-person-fill me-2 text-primary"></i>
            <span th:text="${cliente.id == null ? 'Novo Cliente' : 'Editar Cliente'}"></span>
        </h2>
        <a th:href="@{/clientes}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nome *</label>
                        <input type="text" class="form-control"
                               th:field="*{nome}"
                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                               placeholder="Nome completo do cliente">
                        <div class="invalid-feedback" th:errors="*{nome}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">CPF</label>
                        <input type="text" class="form-control"
                               th:field="*{cpf}"
                               placeholder="000.000.000-00"
                               maxlength="14">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Telefone</label>
                        <input type="text" class="form-control"
                               th:field="*{telefone}"
                               placeholder="(00) 00000-0000"
                               maxlength="20">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">E-mail</label>
                        <input type="email" class="form-control"
                               th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="email@exemplo.com">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Endereço</label>
                        <input type="text" class="form-control"
                               th:field="*{endereco}"
                               placeholder="Rua, número, bairro, cidade">
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
