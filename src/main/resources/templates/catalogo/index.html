<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos — Páscoa Gestão</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-size: 0.93rem; }
        .brand-bar { background: linear-gradient(135deg, #198754, #20c997); }
        .produto-card { transition: transform .15s, box-shadow .15s; border: none; }
        .produto-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.13) !important; }
        .produto-img { width: 100%; height: 200px; object-fit: cover; }
        .produto-img-placeholder { width: 100%; height: 200px; background: #e9ecef;
            display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #adb5bd; }
        .badge-TRUFADO    { background-color: #6f42c1; }
        .badge-RECHEADO   { background-color: #fd7e14; }
        .badge-DIET       { background-color: #0dcaf0; color: #000 !important; }
        .badge-VEGANO     { background-color: #198754; }
        .badge-TRADICIONAL{ background-color: #6c757d; }
        .badge-ESPECIAL   { background-color: #d63384; }
        .filter-btn.active { background-color: #198754 !important; border-color: #198754 !important; color: #fff !important; }
    </style>
</head>
<body>

<!-- Barra de marca -->
<div class="brand-bar text-white py-4 mb-4">
    <div class="container text-center">
        <i class="bi bi-egg-fill me-2" style="font-size:2rem;"></i>
        <h1 class="h3 fw-bold mb-1 d-inline">Páscoa Gestão</h1>
        <p class="mb-0 opacity-75">Nossos deliciosos ovos de Páscoa artesanais</p>
    </div>
</div>

<div class="container pb-5">

    <!-- Filtros por categoria -->
    <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <span class="text-muted me-1 small fw-semibold">Filtrar:</span>
        <a th:href="@{/catalogo}"
           th:classappend="${categoriaAtiva == null} ? 'active'"
           class="btn btn-sm btn-outline-success filter-btn">
            <i class="bi bi-grid me-1"></i>Todos
        </a>
        <a th:each="cat : ${categorias}"
           th:href="@{/catalogo(categoria=${cat.name()})}"
           th:classappend="${categoriaAtiva != null and categoriaAtiva == cat} ? 'active'"
           class="btn btn-sm btn-outline-success filter-btn"
           th:text="${cat.descricao}"></a>
    </div>

    <!-- Grid de produtos -->
    <div th:if="${#lists.isEmpty(produtos)}" class="text-center text-muted py-5">
        <i class="bi bi-egg fs-1 d-block mb-3 opacity-40"></i>
        <p>Nenhum produto disponível nesta categoria no momento.</p>
        <a th:href="@{/catalogo}" class="btn btn-sm btn-outline-success">Ver todos</a>
    </div>

    <div th:unless="${#lists.isEmpty(produtos)}"
         class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${produtos}" class="col">
            <div class="card h-100 produto-card shadow-sm">
                <!-- Foto ou placeholder -->
                <a th:href="@{/catalogo/{id}(id=${p.id})}">
                    <img th:if="${p.foto != null and !p.foto.isEmpty()}"
                         th:src="@{/uploads/{f}(f=${p.foto})}"
                         th:alt="${p.nome}" class="produto-img card-img-top">
                    <div th:unless="${p.foto != null and !p.foto.isEmpty()}"
                         class="produto-img-placeholder card-img-top rounded-top">
                        <i class="bi bi-egg"></i>
                    </div>
                </a>
                <div class="card-body d-flex flex-column">
                    <span th:classappend="'badge-' + ${p.categoria.name()}"
                          class="badge mb-2 align-self-start"
                          th:text="${p.categoria.descricao}"></span>
                    <h6 class="card-title fw-bold mb-1" th:text="${p.nome}"></h6>
                    <p th:if="${p.descricao != null and !p.descricao.isEmpty()}"
                       class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(p.descricao, 80)}"></p>
                    <div class="mt-auto pt-2 d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-success fs-5">
                            R$ <span th:text="${#numbers.formatDecimal(p.precoVenda, 1, 'POINT', 2, 'COMMA')}"></span>
                        </span>
                        <a th:href="@{/catalogo/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-success">
                            <i class="bi bi-eye me-1"></i>Ver
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contador -->
    <div th:unless="${#lists.isEmpty(produtos)}" class="text-muted text-center small mt-4">
        <span th:text="${#lists.size(produtos)}"></span> produto(s) encontrado(s)
    </div>

</div>

<footer class="bg-white border-top py-3 mt-4 text-center text-muted small">
    <i class="bi bi-egg-fill text-success me-1"></i>Páscoa Gestão — Ovos Artesanais
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
