<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::#pageContent})}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Auditoria — Sistema Páscoa</title></head>
<body>
<div id="pageContent">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-semibold mb-0">
            <i class="bi bi-shield-check me-2 text-secondary"></i>Audit Log
        </h4>
    </div>

    <!-- Filtros -->
    <form th:action="@{/auditoria}" method="get" class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Usuário</label>
                    <input type="text" name="usuario" class="form-control form-control-sm"
                           placeholder="Login do usuário" th:value="${usuario}">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Ação</label>
                    <input type="text" name="acao" class="form-control form-control-sm"
                           placeholder="Ex.: CONFIRMAR_PEDIDO" th:value="${acao}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-sm btn-primary w-100">
                        <i class="bi bi-search me-1"></i>Filtrar
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/auditoria}" class="btn btn-sm btn-outline-secondary w-100">
                        <i class="bi bi-x me-1"></i>Limpar
                    </a>
                </div>
            </div>
        </div>
    </form>

    <!-- Tabela -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(logs)}" class="text-center text-muted py-5">
                <i class="bi bi-journal-x fs-2 d-block mb-2 opacity-40"></i>
                Nenhum registro encontrado.
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(logs)}">
                <table class="table table-sm table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:150px">Data/Hora</th>
                            <th style="width:130px">Usuário</th>
                            <th style="width:220px">Ação</th>
                            <th style="width:120px">Entidade</th>
                            <th style="width:80px">ID</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs}">
                            <td class="text-muted small"
                                th:text="${#temporals.format(log.criadoEm, 'dd/MM/yyyy HH:mm:ss')}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${log.usuario}"></span>
                            </td>
                            <td>
                                <code class="small" th:text="${log.acao}"></code>
                            </td>
                            <td class="text-muted small" th:text="${log.entidadeTipo ?: '-'}"></td>
                            <td class="text-muted small" th:text="${log.entidadeId  ?: '-'}"></td>
                            <td class="small text-muted" th:text="${log.detalhes    ?: ''}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Paginação -->
        <div class="card-footer d-flex justify-content-between align-items-center py-2"
             th:if="${page.totalPages > 1}">
            <span class="small text-muted"
                  th:text="|Página ${pagina + 1} de ${page.totalPages} — ${page.totalElements} registros|"></span>
            <div class="d-flex gap-1">
                <a th:if="${pagina > 0}"
                   th:href="@{/auditoria(usuario=${usuario},acao=${acao},pagina=${pagina - 1})}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <a th:if="${pagina < page.totalPages - 1}"
                   th:href="@{/auditoria(usuario=${usuario},acao=${acao},pagina=${pagina + 1})}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
