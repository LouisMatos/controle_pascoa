<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — Sistema Páscoa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #d4edda 0%, #f8f9fa 100%); }
        .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,.12); }
        .strength-bar { height: 4px; border-radius: 2px; transition: width .3s, background .3s; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div style="width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-egg-fill text-success" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-2 mb-0">Páscoa Gestão</h3>
            <p class="text-muted small">Definir Nova Senha</p>
        </div>

        <div class="card">
            <div class="card-body p-4">

                <h5 class="fw-bold mb-1">
                    <i class="bi bi-lock me-2 text-success"></i>Criar Nova Senha
                </h5>
                <p class="text-muted small mb-3">
                    Escolha uma senha segura com no mínimo 8 caracteres.
                </p>

                <!-- Alertas flash -->
                <div th:if="${erro}" class="alert alert-danger py-2 small mb-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    <span th:text="${erro}"></span>
                </div>

                <form th:action="@{/auth/reset-password/{token}(token=${token})}"
                      method="post" id="formReset">

                    <div class="mb-3">
                        <label for="novaSenha" class="form-label fw-semibold">Nova Senha *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password"
                                   id="novaSenha"
                                   name="novaSenha"
                                   class="form-control"
                                   placeholder="Mínimo 8 caracteres"
                                   minlength="8"
                                   autofocus
                                   required
                                   autocomplete="new-password"
                                   oninput="atualizarForca(this.value)">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="toggleVisibilidade('novaSenha', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <!-- Barra de força da senha -->
                        <div class="mt-1 bg-light rounded" style="height:4px;">
                            <div id="forcaBar" class="strength-bar bg-secondary" style="width:0%"></div>
                        </div>
                        <div id="forcaLabel" class="form-text text-muted" style="font-size:.75rem;"></div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmarSenha" class="form-label fw-semibold">Confirmar Nova Senha *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password"
                                   id="confirmarSenha"
                                   name="confirmarSenha"
                                   class="form-control"
                                   placeholder="Repita a senha"
                                   minlength="8"
                                   required
                                   autocomplete="new-password">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="toggleVisibilidade('confirmarSenha', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div id="matchMsg" class="form-text" style="font-size:.75rem;"></div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 mb-3" id="btnSalvar">
                        <i class="bi bi-check-lg me-2"></i>Salvar Nova Senha
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Voltar para o login
                    </a>
                </div>
            </div>
        </div>

        <p class="text-center text-muted small mt-3">
            © 2025 — Confeitaria Artesanal
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleVisibilidade(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function atualizarForca(senha) {
            const bar   = document.getElementById('forcaBar');
            const label = document.getElementById('forcaLabel');
            let forca = 0;
            if (senha.length >= 8)  forca++;
            if (senha.length >= 12) forca++;
            if (/[A-Z]/.test(senha)) forca++;
            if (/[0-9]/.test(senha)) forca++;
            if (/[^A-Za-z0-9]/.test(senha)) forca++;

            const niveis = [
                { pct: '0%',   cor: 'bg-secondary', txt: '' },
                { pct: '25%',  cor: 'bg-danger',     txt: 'Muito fraca' },
                { pct: '50%',  cor: 'bg-warning',    txt: 'Fraca' },
                { pct: '70%',  cor: 'bg-info',       txt: 'Razoável' },
                { pct: '90%',  cor: 'bg-primary',    txt: 'Boa' },
                { pct: '100%', cor: 'bg-success',    txt: 'Forte' },
            ];
            const n = niveis[Math.min(forca, niveis.length - 1)];
            bar.style.width = n.pct;
            bar.className = 'strength-bar ' + n.cor;
            label.textContent = n.txt;
        }

        // Valida match em tempo real
        document.getElementById('confirmarSenha').addEventListener('input', function() {
            const nova      = document.getElementById('novaSenha').value;
            const confirma  = this.value;
            const msg       = document.getElementById('matchMsg');
            const btn       = document.getElementById('btnSalvar');
            if (confirma === '') {
                msg.textContent = '';
                msg.className = 'form-text';
            } else if (nova === confirma) {
                msg.textContent = '✔ Senhas coincidem';
                msg.className = 'form-text text-success';
                btn.disabled = false;
            } else {
                msg.textContent = '✘ Senhas não coincidem';
                msg.className = 'form-text text-danger';
                btn.disabled = true;
            }
        });
    </script>
</body>
</html>
