server:
  port: 8081

spring:
  application:
    name: pascoa-auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pascoa_auth
    username: postgres
    password: sua_senha
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: pascoa123

  rabbitmq:
    host: localhost
    port: 5672
    username: pascoa
    password: pascoa123
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3

auth:
  jwt:
    secret: "ALTERE-ESTA-CHAVE-SECRETA-MINIMO-32-CARACTERES-PROD"
    access-ttl: 15m
    refresh-ttl: 7d

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: ${EUREKA_ENABLED:false}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.seuprojeto.pascoa.auth: DEBUG
